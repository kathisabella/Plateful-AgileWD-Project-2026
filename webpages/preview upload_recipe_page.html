<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plateful — Upload Recipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-upload-recipe">
<div class="wrapper">

<aside class="sidebar">
  <h2>Plateful</h2>
  <a href="#">Home</a>
  <a href="#">Explore</a>
  <a href="#" class="active">Upload</a>
</aside>

<main class="main">

<header class="topbar">
  <div>Upload New Recipe</div>
</header>

<div class="content">

<div class="form-card">
  <h1>Share your recipe</h1>

  <div class="form-group">
    <label>Recipe Title</label>
    <input type="text" placeholder="e.g. Spicy Miso Ramen" />
  </div>

  <div class="row">
    <div class="form-group">
      <label>Cuisine</label>
      <select>
        <option>Japanese</option>
        <option>Italian</option>
        <option>Indian</option>
      </select>
    </div>
    <div class="form-group">
      <label>Difficulty</label>
      <select>
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Prep Time</label>
      <input type="text" placeholder="e.g. 25 min" />
    </div>
    <div class="form-group">
      <label>Servings</label>
      <input type="number" placeholder="e.g. 2" />
    </div>
  </div>

  <div class="form-group">
    <label>Description</label>
    <textarea rows="3" placeholder="Tell people about your recipe..."></textarea>
  </div>

  <div class="form-group">
    <label>Ingredients</label>
    <div class="list-input">
      <input type="text" placeholder="e.g. 200g noodles" />
      <input type="text" placeholder="e.g. 2 tbsp miso" />
    </div>
    <div class="add-btn">+ Add ingredient</div>
  </div>

  <div class="form-group">
    <label>Steps</label>
    <div class="list-input">
      <textarea rows="2" placeholder="Step 1"></textarea>
      <textarea rows="2" placeholder="Step 2"></textarea>
    </div>
    <div class="add-btn">+ Add step</div>
  </div>

  <div class="form-group">
    <label>Upload Image</label>
    <input type="file" />
  </div>

  <button class="submit-btn">Publish Recipe</button>

</div>

</div>
</main>
</div>
</body>
</html>
