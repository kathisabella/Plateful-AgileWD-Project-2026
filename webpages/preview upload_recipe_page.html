<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plateful — Upload Recipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
:root {
  --color-bg:#FFFDF0;
  --color-surface:#FFF2C2;
  --color-surface-alt:#EFF3EA;
  --color-sage:#D9DFC6;
  --color-text:#3a3224;
  --color-muted:#7a6e5f;
  --color-accent:#6e7d52;
  --font-head:'Fraunces', serif;
  --font-ui:'Figtree', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-ui);background:var(--color-bg);color:var(--color-text)}
.wrapper{display:flex;height:100vh}

.sidebar{width:210px;background:var(--color-sage);padding:24px}
.sidebar a{display:block;padding:8px;border-radius:8px;color:var(--color-text)}
.sidebar a.active{background:#bac4a5}

.main{flex:1;display:flex;flex-direction:column}
.topbar{height:60px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--color-sage)}
.content{padding:24px;overflow:auto}

.form-card{
  max-width:720px;
  margin:auto;
  background:#fff;
  border:1px solid #e3dac0;
  border-radius:14px;
  padding:20px;
}

h1{
  font-family:var(--font-head);
  font-size:1.5rem;
  margin-bottom:14px;
}

.form-group{margin-bottom:14px}
.form-group label{
  display:block;
  font-size:0.8rem;
  margin-bottom:4px;
  color:var(--color-muted);
}

input, select, textarea{
  width:100%;
  padding:8px 10px;
  border-radius:8px;
  border:1px solid var(--color-sage);
  font-size:0.8rem;
  font-family:var(--font-ui);
}

textarea{resize:vertical}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.add-btn{
  margin-top:6px;
  font-size:0.75rem;
  color:var(--color-accent);
  cursor:pointer;
}

.list-input{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.submit-btn{
  margin-top:16px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--color-text);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

</style>
</head>
<body>
<div class="wrapper">

<aside class="sidebar">
  <h2>Plateful</h2>
  <a href="#">Home</a>
  <a href="#">Explore</a>
  <a href="#" class="active">Upload</a>
</aside>

<main class="main">

<header class="topbar">
  <div>Upload New Recipe</div>
</header>

<div class="content">

<div class="form-card">
  <h1>Share your recipe</h1>

  <div class="form-group">
    <label>Recipe Title</label>
    <input type="text" placeholder="e.g. Spicy Miso Ramen" />
  </div>

  <div class="row">
    <div class="form-group">
      <label>Cuisine</label>
      <select>
        <option>Japanese</option>
        <option>Italian</option>
        <option>Indian</option>
      </select>
    </div>
    <div class="form-group">
      <label>Difficulty</label>
      <select>
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Prep Time</label>
      <input type="text" placeholder="e.g. 25 min" />
    </div>
    <div class="form-group">
      <label>Servings</label>
      <input type="number" placeholder="e.g. 2" />
    </div>
  </div>

  <div class="form-group">
    <label>Description</label>
    <textarea rows="3" placeholder="Tell people about your recipe..."></textarea>
  </div>

  <div class="form-group">
    <label>Ingredients</label>
    <div class="list-input">
      <input type="text" placeholder="e.g. 200g noodles" />
      <input type="text" placeholder="e.g. 2 tbsp miso" />
    </div>
    <div class="add-btn">+ Add ingredient</div>
  </div>

  <div class="form-group">
    <label>Steps</label>
    <div class="list-input">
      <textarea rows="2" placeholder="Step 1"></textarea>
      <textarea rows="2" placeholder="Step 2"></textarea>
    </div>
    <div class="add-btn">+ Add step</div>
  </div>

  <div class="form-group">
    <label>Upload Image</label>
    <input type="file" />
  </div>

  <button class="submit-btn">Publish Recipe</button>

</div>

</div>
</main>
</div>
</body>
</html>
