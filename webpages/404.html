<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Plateful Page Not Found</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Figtree:wght@400;500;600;700&display=swap" />
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    </head>

    <body class="page-login">
        <div class="split">
            <div class="panel-left">
                <div class="panel-logo">
                    <h1>Plateful</h1>
                    <p>your recipe space</p>
                </div>

                <div class="panel-hero">
                    <p class="tagline">Oops, this page is missing.</p>
                    <p>The page you’re looking for doesn’t exist or may have been moved.</p>
                </div>

                <div class="panel-recipes">
                    <p class="empty-state">Try going back home and exploring recipes instead.</p>
                </div>
            </div>

            <div class="panel-right">
                <div class="form-box">

                    <div class="form-heading">
                    <h2>404 — Page not found</h2>
                    <p>Let’s get you back to somewhere useful.</p>
                    </div>

                    <div class="actions" style="flex-direction: column;">
                    <a href="{{ url_for('dashboard') }}" class="btn save" style="text-align:center;">Go to Dashboard</a>
                    <a href="{{ url_for('explore') }}" class="btn" style="text-align:center;">Explore Recipes</a>
                    <a href="{{ url_for('login_page') }}" class="btn" style="text-align:center;">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
