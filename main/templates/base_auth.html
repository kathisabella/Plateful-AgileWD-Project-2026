<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Plateful{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Figtree:wght@400;500;600;700&display=swap"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
  </head>

  <body class="{% block body_class %}page-login{% endblock %}">
    <div class="split">
      <div class="panel-left">
        {% block panel_left %}{% endblock %}
      </div>
      <div class="panel-right">
        {% block panel_right %}{% endblock %}
      </div>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
