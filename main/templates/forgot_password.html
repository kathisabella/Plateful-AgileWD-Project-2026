<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Plateful Forgot Password</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Figtree:wght@400;500;600;700&display=swap" />
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    </head>

    <body class="page-login">
        <div class="split">

            <div class="panel-left">
                <div class="panel-logo">
                    <h1>Plateful</h1>
                    <p>your recipe space</p>
                </div>

                <div class="panel-hero">
                    <p class="tagline">Reset your password.</p>
                    <p>Enter your email and we’ll help you get back into your account.</p>
                </div>
            </div>

            <div class="panel-right">
                <div class="form-box">

                    <div class="form-heading">
                        <h2>Forgot password</h2>
                        <p>Enter the email linked to your account.</p>
                    </div>

                    <form method="post" action="#">
                        <div class="field">
                            <label for="reset-email">Email</label>
                            <input type="email" id="reset-email" name="email" placeholder="" />
                        </div>

                        <button type="submit" class="btn-submit">Send reset link</button>

                        <div class="form-footer" style="margin-top: 16px;">
                            <a href="{{ url_for('login_page') }}">← Back to login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
